<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EA Final Quiz</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #647184;
      --line: #d8dee8;
      --brand: #2364aa;
      --brand-dark: #174d86;
      --ok: #177245;
      --ok-bg: #e8f6ee;
      --bad: #b3261e;
      --bad-bg: #fdeceb;
      --warn: #8a5a00;
      --warn-bg: #fff5d7;
      --shadow: 0 18px 45px rgba(34, 45, 60, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, #eef3f8 0, #f7f8fb 310px),
        var(--bg);
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 22px 0 28px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .title h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .title p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      min-height: 38px;
      padding: 0 13px;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color .15s, background .15s, color .15s, transform .15s;
    }

    .btn:hover {
      border-color: #9fb2ca;
      transform: translateY(-1px);
    }

    .btn.primary {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }

    .btn.primary:hover {
      background: var(--brand-dark);
    }

    .btn.ghost {
      background: transparent;
    }

    .btn:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 18px;
      align-items: start;
    }

    .side,
    .main {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .side {
      padding: 16px;
      position: sticky;
      top: 16px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px;
      min-height: 72px;
      background: #fbfcfe;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .stat strong {
      font-size: 22px;
      line-height: 1;
    }

    .progress {
      height: 10px;
      border-radius: 999px;
      background: #e8edf4;
      overflow: hidden;
      margin: 6px 0 16px;
    }

    .progress div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--brand), #2f9c73);
      transition: width .2s;
    }

    .mode-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .lecture-section {
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 14px 0;
      margin-bottom: 14px;
    }

    .lecture-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 9px;
    }

    .lecture-title span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
    }

    .lecture-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .lecture-btn {
      min-height: 46px;
      padding: 7px 9px;
      text-align: left;
      line-height: 1.25;
    }

    .lecture-btn strong,
    .lecture-btn span {
      display: block;
    }

    .lecture-btn strong {
      font-size: 13px;
    }

    .lecture-btn span {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .lecture-btn.primary span {
      color: rgba(255, 255, 255, .82);
    }

    .search {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 11px;
      margin-bottom: 12px;
      color: var(--ink);
      background: #fff;
    }

    .question-list {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
      max-height: 330px;
      overflow: auto;
      padding-right: 2px;
    }

    .qdot {
      height: 38px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      cursor: pointer;
    }

    .qdot.current {
      border-color: var(--brand);
      box-shadow: inset 0 0 0 2px rgba(35, 100, 170, .16);
    }

    .qdot.correct {
      background: var(--ok-bg);
      border-color: #9bd7b6;
      color: var(--ok);
    }

    .qdot.wrong {
      background: var(--bad-bg);
      border-color: #f0aaa5;
      color: var(--bad);
    }

    .main {
      min-height: 620px;
      padding: 22px;
    }

    .question-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: #eef4fb;
      color: var(--brand-dark);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .question-index {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .question {
      margin: 22px 0 18px;
      font-size: 21px;
      line-height: 1.45;
      letter-spacing: 0;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .option {
      width: 100%;
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 12px;
      align-items: center;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      min-height: 58px;
      padding: 10px 14px 10px 10px;
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .15s;
    }

    .option:hover {
      border-color: #9fb2ca;
      transform: translateY(-1px);
    }

    .letter {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: #f6f8fb;
      font-weight: 700;
    }

    .option.correct {
      border-color: #7fc89e;
      background: var(--ok-bg);
    }

    .option.correct .letter {
      background: var(--ok);
      border-color: var(--ok);
      color: #fff;
    }

    .option.wrong {
      border-color: #e89b95;
      background: var(--bad-bg);
    }

    .option.wrong .letter {
      background: var(--bad);
      border-color: var(--bad);
      color: #fff;
    }

    .feedback {
      display: none;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 14px;
      margin: 12px 0 18px;
      line-height: 1.55;
    }

    .feedback.show {
      display: block;
    }

    .feedback.correct {
      border-color: #9bd7b6;
      background: var(--ok-bg);
    }

    .feedback.wrong {
      border-color: #f0aaa5;
      background: var(--bad-bg);
    }

    .feedback strong {
      display: block;
      margin-bottom: 5px;
    }

    .feedback div {
      margin-top: 10px;
    }

    .feedback span {
      display: block;
    }

    .memory-card {
      border: 1px solid #e2cc7a;
      border-radius: 8px;
      background: #fff9e8;
      padding: 12px 14px;
      margin: 0 0 18px;
      line-height: 1.5;
      color: #3f3300;
    }

    .memory-card strong,
    .cheat-sheet strong {
      display: block;
      margin-bottom: 4px;
    }

    .lecture-guide {
      margin-top: 16px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .guide-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 9px;
    }

    .guide-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
      padding: 10px;
      margin-bottom: 8px;
      line-height: 1.45;
      font-size: 13px;
    }

    .guide-card strong,
    .guide-card span {
      display: block;
    }

    .guide-card strong {
      margin-bottom: 4px;
    }

    .guide-meta {
      color: var(--muted);
      margin-top: 4px;
    }

    .guide-focus {
      color: var(--warn);
      margin-top: 6px;
    }

    .guide-questions {
      color: var(--brand-dark);
      margin-top: 6px;
    }

    .cheat-sheet {
      margin-top: 16px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .cheat-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 9px;
    }

    .cheat-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
      padding: 10px;
      margin-bottom: 8px;
      line-height: 1.45;
      font-size: 13px;
    }

    .cheat-card span {
      display: block;
      color: var(--muted);
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      padding-top: 4px;
    }

    .empty {
      display: none;
      border: 1px dashed #b6c2d1;
      border-radius: 8px;
      padding: 28px;
      text-align: center;
      color: var(--muted);
      background: #fbfcfe;
    }

    .empty.show {
      display: block;
    }

    @media (max-width: 860px) {
      .app {
        width: min(100% - 20px, 720px);
        padding-top: 12px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .side {
        position: static;
      }

      .question-list {
        grid-template-columns: repeat(8, 1fr);
        max-height: none;
      }

      .main {
        min-height: auto;
        padding: 16px;
      }

      .question-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .question {
        font-size: 18px;
      }
    }

    @media (max-width: 520px) {
      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .question-list {
        grid-template-columns: repeat(5, 1fr);
      }

      .option {
        grid-template-columns: 34px 1fr;
      }

      .mode-row,
      .lecture-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="title">
        <h1>EA 期末刷题</h1>
        <p>40 道单选，可按 Lecture + Discussion 考点逐讲刷题。</p>
      </div>
      <div class="toolbar">
        <button class="btn" id="shuffleBtn" type="button">随机顺序</button>
        <button class="btn" id="wrongBtn" type="button">错题模式</button>
        <button class="btn ghost" id="resetBtn" type="button">重置记录</button>
      </div>
    </header>

    <section class="layout">
      <aside class="side">
        <div class="stats" aria-live="polite">
          <div class="stat"><span>已答</span><strong id="answeredStat">0/40</strong></div>
          <div class="stat"><span>正确率</span><strong id="accuracyStat">0%</strong></div>
          <div class="stat"><span>正确</span><strong id="correctStat">0</strong></div>
          <div class="stat"><span>错题</span><strong id="wrongStat">0</strong></div>
        </div>
        <div class="progress" aria-label="Progress"><div id="progressBar"></div></div>
        <div class="mode-row">
          <button class="btn primary" id="allModeBtn" type="button">全部题目</button>
          <button class="btn" id="unansweredBtn" type="button">未答题</button>
        </div>
        <div class="lecture-section">
          <div class="lecture-title">逐 Lecture 刷题 <span>按老师 Discussion 抓考点</span></div>
          <div class="lecture-row" id="lectureRow" aria-label="Lecture filters"></div>
        </div>
        <input class="search" id="searchInput" type="search" placeholder="搜索题干/主题/中文考点" />
        <div class="question-list" id="questionList" aria-label="Question list"></div>
        <div class="lecture-guide" id="lectureGuide"></div>
        <div class="cheat-sheet">
          <div class="cheat-title">考前核心表</div>
          <div id="cheatSheet"></div>
        </div>
      </aside>

      <section class="main">
        <div class="empty" id="emptyState">
          当前筛选没有题目。
        </div>
        <article id="questionCard">
          <div class="question-head">
            <span class="tag" id="topicTag">Topic</span>
            <span class="question-index" id="questionIndex">Question 1 of 40</span>
          </div>
          <h2 class="question" id="questionText"></h2>
          <div class="memory-card" id="memoryCard"></div>
          <div class="options" id="options"></div>
          <div class="feedback" id="feedback"></div>
          <div class="actions">
            <button class="btn" id="prevBtn" type="button">上一题</button>
            <button class="btn primary" id="nextBtn" type="button">下一题</button>
          </div>
        </article>
      </section>
    </section>
  </main>

  <script>
    const QUESTIONS = [
      {
        id: 1,
        topic: "Architecture definition",
        question: "In the course slides, architecture is best defined as:",
        options: [
          "The complete source code of an information system",
          "Fundamental concepts or properties of a system in its environment, embodied in elements, relationships, and principles",
          "A project schedule for software implementation",
          "A list of hardware components used by an organization"
        ],
        answer: 1,
        explanation: "Lecture 1 gives this as the formal definition of architecture."
      },
      {
        id: 2,
        topic: "EA definition",
        question: "Which statement best describes Enterprise Architecture (EA)?",
        options: [
          "A coherent whole of principles, methods, and models used to design and realize organizational structure, business processes, information systems, and infrastructure",
          "A database normalization method for reducing redundancy",
          "A purely technical diagram of servers and networks",
          "A financial reporting standard for public companies"
        ],
        answer: 0,
        explanation: "EA connects organization, processes, information systems, and infrastructure."
      },
      {
        id: 3,
        topic: "Enterprise scope",
        question: "In EA, the term enterprise means:",
        options: [
          "Only the IT department",
          "Only a legally registered company",
          "Any collection of organizations with common goals and/or a single bottom line",
          "Only the database system used by a business"
        ],
        answer: 2,
        explanation: "The scope is broader than IT and can include organizations, units, partnerships, and outsourced operations."
      },
      {
        id: 4,
        topic: "Stakeholder",
        question: "Why should stakeholders be considered in enterprise architecture work?",
        options: [
          "Because architecture descriptions address their concerns and viewpoints",
          "Because stakeholders always write the database queries",
          "Because stakeholders replace the need for architectural models",
          "Because only external stakeholders are allowed to approve IT systems"
        ],
        answer: 0,
        explanation: "Discussion in Lecture 1 and ISO/IEEE concepts emphasize stakeholder concerns and viewpoints."
      },
      {
        id: 5,
        topic: "EA origin",
        question: "According to the historical background in Lecture 1, EA emerged mainly to address:",
        options: [
          "Marketing automation and social media analytics",
          "System complexity and poor business alignment",
          "Employee recruitment and training",
          "The replacement of all legacy systems with cloud systems"
        ],
        answer: 1,
        explanation: "Roger Sessions' summary in Lecture 1 highlights these two original problems."
      },
      {
        id: 6,
        topic: "Drivers",
        question: "Which of the following is an example of an external driver for EA?",
        options: [
          "A new regulatory law requiring changes in IT management",
          "A team choosing a new screen color for an internal tool",
          "A developer refactoring one class",
          "A temporary local printer failure"
        ],
        answer: 0,
        explanation: "Lecture 2 lists legal/regulatory pressure as an external driver."
      },
      {
        id: 7,
        topic: "Alignment",
        question: "Vertical alignment in Lecture 2 refers to the relation between:",
        options: [
          "Internal processes and external customers",
          "Top strategy and people at the bottom",
          "Application components and database tables",
          "Suppliers and revenue streams"
        ],
        answer: 1,
        explanation: "Horizontal alignment is internal processes to external customers; vertical is strategy to people."
      },
      {
        id: 8,
        topic: "BSC",
        question: "The Balanced Scorecard views an enterprise from which four perspectives?",
        options: [
          "Cost, risk, schedule, quality",
          "Business, data, application, technology",
          "Financial, customer, internal business processes, learning and growth",
          "Strategy, governance, compliance, procurement"
        ],
        answer: 2,
        explanation: "Lecture 2 and Seminar 2 repeat these four BSC perspectives."
      },
      {
        id: 9,
        topic: "BSC",
        question: "For each BSC perspective, the slides propose which three-layered structure?",
        options: [
          "Mission, objectives, measures",
          "Input, process, output",
          "Actor, role, interface",
          "Strategy, application, infrastructure"
        ],
        answer: 0,
        explanation: "This structure is explicitly listed in Lecture 2 and Seminar 2."
      },
      {
        id: 10,
        topic: "BMC",
        question: "In the Business Model Canvas, the centre of the canvas is:",
        options: [
          "Cost structure",
          "Key partners",
          "Value proposition",
          "Revenue streams"
        ],
        answer: 2,
        explanation: "Lecture 2 identifies value proposition as the center, describing what is offered to customers."
      },
      {
        id: 11,
        topic: "Business architecture",
        question: "Business architecture is described in Lecture 2 as:",
        options: [
          "A blueprint that provides a common understanding and aligns strategic objectives with tactical demands",
          "A replacement for all enterprise governance instruments",
          "A list of SQL tables and indexes",
          "A financial audit checklist"
        ],
        answer: 0,
        explanation: "The slides define business architecture as a business-oriented abstraction translating strategy into action."
      },
      {
        id: 12,
        topic: "EFQM",
        question: "The EFQM model consists of:",
        options: [
          "Four criteria: all financial",
          "Nine criteria: five enablers and four results",
          "Three layers: CIM, PIM, PSM",
          "Five COBIT process domains"
        ],
        answer: 1,
        explanation: "Lecture 3 and Seminar 3 emphasize the nine EFQM criteria."
      },
      {
        id: 13,
        topic: "EFQM vs ISO",
        question: "Compared with ISO 9001, EFQM is presented as:",
        options: [
          "Narrower and limited to technical software testing",
          "Broader, providing an overall management framework for performance excellence",
          "Identical in scope and purpose",
          "A database modeling language"
        ],
        answer: 1,
        explanation: "Lecture 3 states EFQM has a much broader scope than ISO 9001."
      },
      {
        id: 14,
        topic: "BSC vs EFQM",
        question: "Which statement best captures the relationship between BSC and EFQM in the slides?",
        options: [
          "BSC focuses on strategic management, while EFQM supports measuring and benchmarking for continuous improvement",
          "BSC is only for IT infrastructure, while EFQM is only for databases",
          "BSC and EFQM are mutually exclusive and cannot be used together",
          "EFQM replaces the need for strategy"
        ],
        answer: 0,
        explanation: "Lecture 3 explicitly says they are complementary."
      },
      {
        id: 15,
        topic: "COBIT",
        question: "COBIT mainly aims to bridge gaps between:",
        options: [
          "Business risks, control needs, and technical issues",
          "Customer segments, channels, and pricing",
          "UML diagrams, BPMN tasks, and IDEF boxes",
          "Physical machines, materials, and facilities"
        ],
        answer: 0,
        explanation: "This is the COBIT purpose stated in Lecture 3."
      },
      {
        id: 16,
        topic: "COBIT domains",
        question: "Which option is one of the five COBIT process domains listed in Lecture 3?",
        options: [
          "Build, acquire and implement",
          "Product, contract and value",
          "Structure, behaviour and implementation",
          "Mission, objective and measure"
        ],
        answer: 0,
        explanation: "COBIT domains include EDM, APO, BAI, DSS, and MEA."
      },
      {
        id: 17,
        topic: "ITIL",
        question: "ITIL is best described as:",
        options: [
          "A set of best practices for IT service delivery and support",
          "A model for classifying enterprise artifacts in a matrix",
          "A language for object-oriented software diagrams only",
          "A method for defining external business drivers"
        ],
        answer: 0,
        explanation: "Lecture 3 presents ITIL as best practices for IT service management."
      },
      {
        id: 18,
        topic: "COBIT vs ITIL",
        question: "The relationship between COBIT and ITIL is best summarized as:",
        options: [
          "COBIT tells what should be controlled; ITIL explains how best-practice processes can realize it",
          "ITIL defines enterprise strategy; COBIT defines customer value propositions",
          "COBIT is only for marketing; ITIL is only for finance",
          "They are identical frameworks with different names"
        ],
        answer: 0,
        explanation: "Lecture 3 states COBIT's control objectives tell what to do; ITIL explains how."
      },
      {
        id: 19,
        topic: "CMMI",
        question: "At which CMMI level does EA become especially useful because projects must conform to organization-wide standards and guidelines?",
        options: [
          "Level 1 Initial",
          "Level 2 Managed",
          "Level 3 Defined and beyond",
          "Level 5 only"
        ],
        answer: 2,
        explanation: "Lecture 3 explicitly links EA usefulness to CMMI Level 3 and beyond."
      },
      {
        id: 20,
        topic: "ISO/IEEE 42010",
        question: "IEEE 1471 / ISO/IEC 42010 mainly provides:",
        options: [
          "A theoretical base and terms for architecture description",
          "A revenue model for customer segments",
          "A language restricted to process modeling",
          "A maturity model for IT governance"
        ],
        answer: 0,
        explanation: "Lecture 3 presents this standard as a foundation for architecture descriptions."
      },
      {
        id: 21,
        topic: "Architecture description",
        question: "Which item is one of the six architecture description practices in IEEE 1471 / ISO/IEC 42010?",
        options: [

        avoid: "B/C/D 分别是物理网络、财务、硬件部署，不是 BPMN 的主要范围。"
      },
      30: {
        ask: "题目问：UML 图的三大类。",
        clue: "UML 三类：Structure / Behaviour / Implementation。",
        choose: "选 A，因为课件把 UML 13 种图分到这三类。",
        avoid: "B 是 BSC，C 是 ArchiMate/TOGAF 层，D 是知识目标阶段。"
      },
      31: {
        ask: "题目问：IDEF、BPMN、UML 这类语言用于 EA 时的共同问题。",
        clue: "共同问题是跨 domain 对不上，语义也不够强。",
        choose: "选 A，因为它们往往只擅长某一块，难以表达 business/application/technology 之间的关系。",
        avoid: "B/C/D 都太绝对或事实错误。"
      },
      32: {
        ask: "题目问：common, well-defined vocabulary 是为了支持哪类架构活动。",
        clue: "题干问 vocabulary。课件在 Design 小节说设计时需要共同词汇来避免误解。",
        choose: "选 A，因为统一术语首先是为了支持架构设计，让大家对概念说同一种话。",
        avoid: "B 是商业收入，C 是法律注册，D 是办公室布局，和课件语境不沾边。"
      },
      33: {
        ask: "题目问：compositionality 是什么思路。",
        clue: "composition = 组成。先拆成 parts，再看 relations。",
        choose: "选 A，因为组合性就是用部件及部件关系来处理复杂系统。",
        avoid: "B 是反着来，C 把视角限制太死，D 是否定正式建模。"
      },
      34: {
        ask: "题目问：view 和 viewpoint 怎么区分。",
        clue: "View 是画出来/写出来的具体视图；Viewpoint 是怎么画、怎么看的规则。",
        choose: "选 A，因为它同时说清了 view 服务 stakeholder concerns，viewpoint 提供 conventions。",
        avoid: "B/C 是编造，D 说二者一样也错。"
      },
      35: {
        ask: "题目问：symbolic model 和 semantic model 的区别。",
        clue: "symbolic 看符号；semantic 看意义。",
        choose: "选 A，因为 symbolic model 用符号表达结构，semantic model 解释这些符号到底代表什么。",
        avoid: "B/C/D 都把符号、语义和关系说错了。"
      },
      36: {
        ask: "题目问：知识在 stakeholder 之间传播的三个阶段。",
        clue: "三步：Aware 知道，Agreed 同意，Committed 承诺行动。",
        choose: "选 A，因为这是 Lecture 6 明确列出的知识共享阶段。",
        avoid: "B 是 BSC，C 是 CMMI，D 是 IDEF0。"
      },
      37: {
        ask: "题目问：committing review 适合什么场景。",
        clue: "committing 这个词说明重点是 commit，不只是讨论。",
        choose: "选 A，因为它要求 stakeholders 在多个架构方案中选择并承诺一个方案。",
        avoid: "B 是 elicitation interview，C 是 mailing，D 根本没有 stakeholder 沟通。"
      },
      38: {
        ask: "题目问：ArchiMate 的三大主层。",
        clue: "从上到下：Business 提供业务，Application 支撑业务，Technology 支撑应用。",
        choose: "选 A，因为 ArchiMate 三层就是 Business/Application/Technology。",
        avoid: "B 是 BSC，C 是治理/质量框架，D 是三个 EA 框架/方法。"
      },
      39: {
        ask: "题目问：ArchiMate 里的 business process 是什么。",
        clue: "process = sequence；business process = sequence of business behaviours。",
        choose: "选 A，因为业务流程是一串业务行为，用来达成特定结果。",
        avoid: "B 是 technology/device，C 是 data object，D 是 constraint。"
      },
      40: {
        ask: "题目问：两个 plateau 之间的差异叫什么。",
        clue: "Plateau 是阶段状态；两个阶段状态之间的差，就是 Gap。",
        choose: "选 A，因为 ArchiMate migration planning 里 Gap 专门表示两个 plateaus 的差异。",
        avoid: "B 是动因，C 是业务参与者，D 是应用接口。"
      }
    };

    const STORAGE_KEY = "ea-final-quiz-state-v1";
    const letters = ["A", "B", "C", "D"];

    const state = {
      order: QUESTIONS.map((q) => q.id),
      current: 0,
      mode: "all",
      lecture: "all",
      search: "",
      answers: {}
    };

    const els = {
      answeredStat: document.getElementById("answeredStat"),
      accuracyStat: document.getElementById("accuracyStat"),
      correctStat: document.getElementById("correctStat"),
      wrongStat: document.getElementById("wrongStat"),
      progressBar: document.getElementById("progressBar"),
      allModeBtn: document.getElementById("allModeBtn"),
      unansweredBtn: document.getElementById("unansweredBtn"),
      shuffleBtn: document.getElementById("shuffleBtn"),
      wrongBtn: document.getElementById("wrongBtn"),
      resetBtn: document.getElementById("resetBtn"),
      searchInput: document.getElementById("searchInput"),
      lectureRow: document.getElementById("lectureRow"),
      questionList: document.getElementById("questionList"),
      lectureGuide: document.getElementById("lectureGuide"),
      emptyState: document.getElementById("emptyState"),
      questionCard: document.getElementById("questionCard"),
      topicTag: document.getElementById("topicTag"),
      questionIndex: document.getElementById("questionIndex"),
      questionText: document.getElementById("questionText"),
      memoryCard: document.getElementById("memoryCard"),
      options: document.getElementById("options"),
      feedback: document.getElementById("feedback"),
      cheatSheet: document.getElementById("cheatSheet"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn")
    };

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!saved || typeof saved !== "object") return;
        if (Array.isArray(saved.order) && saved.order.length === QUESTIONS.length) {
          state.order = saved.order.filter((id) => QUESTIONS.some((q) => q.id === id));
        }
        if (saved.answers && typeof saved.answers === "object") {
          state.answers = saved.answers;
        }
        if (Number.isInteger(saved.current)) {
          state.current = Math.max(0, Math.min(saved.current, QUESTIONS.length - 1));
        }
        if (saved.lecture === "all" || LECTURES.some((lecture) => lecture.id === saved.lecture)) {
          state.lecture = saved.lecture;
        }
      } catch {
        localStorage.removeItem(STORAGE_KEY);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        order: state.order,
        current: state.current,
        lecture: state.lecture,
        answers: state.answers
      }));
    }

    function getQuestionById(id) {
      return QUESTIONS.find((q) => q.id === id);
    }

    function getLectureById(lectureId) {
      return LECTURES.find((lecture) => lecture.id === lectureId);
    }

    function idsForLecture(lectureId) {
      if (lectureId === "all") return QUESTIONS.map((q) => q.id);
      const lecture = getLectureById(lectureId);
      if (!lecture) return [];
      const [start, end] = lecture.range;
      return QUESTIONS.filter((q) => q.lecture === lectureId || (!q.lecture && q.id >= start && q.id <= end)).map((q) => q.id);
    }

    function getLectureForQuestion(questionId) {
      const question = getQuestionById(questionId);
      if (question?.lecture) return getLectureById(question.lecture);
      return LECTURES.find((lecture) => {
        const [start, end] = lecture.range;
        return questionId >= start && questionId <= end;
      });
    }

    function questionMatchesLecture(questionId) {
      return state.lecture === "all" || getLectureForQuestion(questionId)?.id === state.lecture;
    }

    function getQuestionDiscussions(questionId) {
      return LECTURES.flatMap((lecture) => lecture.discussions
        .filter((discussion) =>
          (discussion.questionIds || []).includes(questionId) ||
          (discussion.crossRefIds || []).includes(questionId)
        )
        .map((discussion) => ({ ...discussion, lecture }))
      );
    }

    function getQuestionSearchText(q) {
      const zh = TRANSLATIONS[q.id] || {};
      const human = HUMAN_EXPLANATIONS[q.id] || {};
      const discussions = getQuestionDiscussions(q.id);
      return [
        q.topic,
        q.question,
        ...q.options,
        q.explanation,
        zh.questionZh,
        zh.answerZh,
        zh.explanationZh,
        MEMORY_TIPS[q.id],
        human.ask,
        human.clue,
        human.choose,
        human.avoid,
        ...discussions.flatMap(({ lecture, page, title, tip }) => [lecture.title, lecture.summary, lecture.examFocus, page, title, tip])
      ].filter(Boolean).join(" ").toLowerCase();
    }

    function getLectureProgress(lectureId) {
      const ids = idsForLecture(lectureId);
      const answered = ids.filter((id) => state.answers[id]).length;
      const correct = ids.filter((id) => state.answers[id]?.correct).length;
      return { total: ids.length, answered, correct, wrong: answered - correct };
    }

    function filteredIds() {
      const term = state.search.trim().toLowerCase();
      return state.order.filter((id) => {
        const q = getQuestionById(id);
        const record = state.answers[id];
        const matchesMode =
          state.mode === "all" ||
          (state.mode === "wrong" && record && !record.correct) ||
          (state.mode === "unanswered" && !record);
        const matchesLecture = questionMatchesLecture(id);
        const matchesSearch = !term || getQuestionSearchText(q).includes(term);
        return matchesMode && matchesLecture && matchesSearch;
      });
    }

    function currentQuestion() {
      const ids = filteredIds();
      if (!ids.length) return null;
      state.current = Math.max(0, Math.min(state.current, ids.length - 1));
      return getQuestionById(ids[state.current]);
    }

    function answerQuestion(questionId, selected) {
      const q = getQuestionById(questionId);
      state.answers[questionId] = {
        selected,
        correct: selected === q.answer
      };
      saveState();
      render();
    }

    function renderStats() {
      const ids = idsForLecture(state.lecture);
      const records = ids.map((id) => state.answers[id]).filter(Boolean);
      const answered = records.length;
      const correct = records.filter((r) => r.correct).length;
      const wrong = answered - correct;
      const accuracy = answered ? Math.round((correct / answered) * 100) : 0;

      els.answeredStat.textContent = `${answered}/${ids.length}`;
      els.accuracyStat.textContent = `${accuracy}%`;
      els.correctStat.textContent = String(correct);
      els.wrongStat.textContent = String(wrong);
      els.progressBar.style.width = `${ids.length ? (answered / ids.length) * 100 : 0}%`;
    }

    function renderModes() {
      els.allModeBtn.classList.toggle("primary", state.mode === "all");
      els.unansweredBtn.classList.toggle("primary", state.mode === "unanswered");
      els.wrongBtn.classList.toggle("primary", state.mode === "wrong");
    }

    function renderLectureFilters() {
      const allProgress = getLectureProgress("all");
      const buttons = [{ id: "all", title: "全部", label: "All", progress: allProgress },
        ...LECTURES.map((lecture) => ({
          id: lecture.id,
          title: lecture.label,
          label: lecture.title,
          progress: getLectureProgress(lecture.id)
        }))
      ];

      els.lectureRow.innerHTML = buttons.map((item) => `
        <button class="btn lecture-btn ${state.lecture === item.id ? "primary" : ""}" type="button" data-lecture="${escapeHtml(item.id)}">
          <strong>${escapeHtml(item.title)}</strong>
          <span>${item.progress.answered}/${item.progress.total} 已答</span>
        </button>
      `).join("");
    }

    function questionRefs(ids) {
      if (!ids || !ids.length) return "";
      return ids.map((id) => `Q${id}`).join("、");
    }

    function renderLectureGuide() {
      if (state.lecture === "all") {
        els.lectureGuide.innerHTML = `
          <div class="guide-title">Lecture Discussion 考点总览</div>
          ${LECTURES.map((lecture) => `
            <div class="guide-card">
              <strong>${escapeHtml(lecture.label)} · ${escapeHtml(lecture.summary)}</strong>
              <span class="guide-meta">${escapeHtml(lecture.discussions.map((item) => `${item.page} ${item.title}`).join("；"))}</span>
              <span class="guide-focus">${escapeHtml(lecture.examFocus)}</span>
            </div>
          `).join("")}
        `;
        return;
      }

      const lecture = getLectureById(state.lecture);
      if (!lecture) {
        els.lectureGuide.innerHTML = "";
        return;
      }

      const progress = getLectureProgress(lecture.id);
      els.lectureGuide.innerHTML = `
        <div class="guide-title">${escapeHtml(lecture.title)} 必会 Discussion</div>
        <div class="guide-card">
          <strong>${escapeHtml(lecture.summary)}</strong>
          <span class="guide-meta">当前 Lecture 进度：${progress.answered}/${progress.total} 已答，${progress.correct} 正确，${progress.wrong} 错题</span>
          <span class="guide-focus">${escapeHtml(lecture.examFocus)}</span>
        </div>
        ${lecture.discussions.map((item) => `
          <div class="guide-card">
            <strong>${escapeHtml(item.page)} · ${escapeHtml(item.title)}</strong>
            <span>${escapeHtml(item.tip)}</span>
            ${item.questionIds?.length ? `<span class="guide-questions">覆盖题：${escapeHtml(questionRefs(item.questionIds))}</span>` : ""}
            ${item.crossRefIds?.length ? `<span class="guide-questions">交叉复习：${escapeHtml(questionRefs(item.crossRefIds))}</span>` : ""}
          </div>
        `).join("")}
      `;
    }

    function renderQuestionList() {
      const ids = filteredIds();
      els.questionList.innerHTML = "";
      ids.forEach((id, index) => {
        const q = getQuestionById(id);
        const record = state.answers[id];
        const button = document.createElement("button");
        button.type = "button";
        button.className = "qdot";
        if (index === state.current) button.classList.add("current");
        if (record && record.correct) button.classList.add("correct");
        if (record && !record.correct) button.classList.add("wrong");
        const lecture = getLectureForQuestion(id);
        button.textContent = String(id);
        button.title = `Question ${id} · ${lecture?.title || "Lecture"} · ${q.topic}`;
        button.addEventListener("click", () => {
          state.current = index;
          saveState();
          render();
        });
        els.questionList.appendChild(button);
      });
    }

    function renderCheatSheet() {
      els.cheatSheet.innerHTML = CHEAT_SHEET.map((item) => `
        <div class="cheat-card">
          <strong>${escapeHtml(item.title)}</strong>
          <span>${escapeHtml(item.note)}</span>
        </div>
      `).join("");
    }

    function renderQuestion() {
      const ids = filteredIds();
      const q = currentQuestion();
      const hasQuestion = Boolean(q);

      els.emptyState.classList.toggle("show", !hasQuestion);
      els.questionCard.style.display = hasQuestion ? "" : "none";
      if (!q) return;

      const record = state.answers[q.id];
      const lecture = getLectureForQuestion(q.id);
      const discussions = getQuestionDiscussions(q.id);
      const discussionText = discussions.length
        ? discussions.map(({ lecture: itemLecture, page, title }) => `${itemLecture.label} ${page} · ${title}`).join("；")
        : `${lecture?.label || "Lecture"} 基础定义/组件清单`;
      els.topicTag.textContent = `${lecture?.title || "Lecture"} · ${q.topic}`;
      els.questionIndex.textContent = `Question ${q.id} | ${state.current + 1} of ${ids.length}`;
      els.questionText.textContent = q.question;
      els.memoryCard.innerHTML = record
        ? `<strong>速记</strong><span>${escapeHtml(MEMORY_TIPS[q.id] || q.memory || "先看题干关键词，再排除明显不属于该框架的选项。")}</span>`
        : `<strong>${escapeHtml(lecture?.label || "Lecture")} 作答提示</strong><span>${escapeHtml(lecture?.examFocus || "先独立判断，不显示口诀；选完后会显示题目翻译、速记和解析。")}</span>`;
      els.options.innerHTML = "";

      q.options.forEach((option, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        if (record) {
          if (index === q.answer) button.classList.add("correct");
          if (index === record.selected && index !== q.answer) button.classList.add("wrong");
        }
        button.innerHTML = `<span class="letter">${letters[index]}</span><span>${escapeHtml(option)}</span>`;
        button.addEventListener("click", () => answerQuestion(q.id, index));
        els.options.appendChild(button);
      });

      if (record) {
        const selectedLetter = letters[record.selected];
        const correctLetter = letters[q.answer];
        const zh = TRANSLATIONS[q.id] || {
          questionZh: q.questionZh,
          answerZh: q.answerZh,
          explanationZh: q.explanationZh
        };
        const memoryTip = MEMORY_TIPS[q.id] || q.memory || "先看题干关键词，再排除明显不属于该框架的选项。";
        const human = HUMAN_EXPLANATIONS[q.id] || q.human || {
          ask: q.ask || `题目问：${zh.questionZh || q.question}`,
          clue: q.clue || memoryTip,
          choose: q.choose || zh.explanationZh || q.explanation,
          avoid: q.avoid || "其他选项通常属于别的框架，或把概念范围说得太大/太小。"
        };
        const zhBlock = `
          <div><strong>对应 Discussion</strong><span>${escapeHtml(discussionText)}</span></div>
          <div><strong>速记</strong><span>${escapeHtml(memoryTip)}</span></div>
          <div><strong>题目翻译</strong><span>${escapeHtml(zh.questionZh || "暂无翻译")}</span></div>
          <div><strong>正确答案翻译</strong><span>${correctLetter}. ${escapeHtml(zh.answerZh || q.options[q.answer])}</span></div>
          <div><strong>题目在问什么</strong><span>${escapeHtml(human.ask)}</span></div>
          <div><strong>关键词</strong><span>${escapeHtml(human.clue)}</span></div>
          <div><strong>为什么选 ${correctLetter}</strong><span>${escapeHtml(human.choose)}</span></div>
          <div><strong>其他选项为什么不选</strong><span>${escapeHtml(human.avoid)}</span></div>
          <div><strong>English note</strong><span>${escapeHtml(q.explanation)}</span></div>
        `;
        els.feedback.className = `feedback show ${record.correct ? "correct" : "wrong"}`;
        els.feedback.innerHTML = record.correct
          ? `<strong>回答正确：${correctLetter}</strong>${zhBlock}`
          : `<strong>回答错误：你选了 ${selectedLetter}，正确答案是 ${correctLetter}</strong>${zhBlock}`;
      } else {
        els.feedback.className = "feedback";
        els.feedback.innerHTML = "";
      }

      els.prevBtn.disabled = state.current === 0;
      els.nextBtn.disabled = state.current >= ids.length - 1;
    }

    function render() {
      renderStats();
      renderModes();
      renderLectureFilters();
      renderQuestionList();
      renderLectureGuide();
      renderCheatSheet();
      renderQuestion();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function shuffleOrder() {
      const next = [...state.order];
      for (let i = next.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [next[i], next[j]] = [next[j], next[i]];
      }
      state.order = next;
      state.current = 0;
      saveState();
      render();
    }

    function setMode(mode) {
      state.mode = mode;
      state.current = 0;
      render();
    }

    function setLecture(lectureId) {
      state.lecture = lectureId;
      state.current = 0;
      saveState();
      render();
    }

    els.allModeBtn.addEventListener("click", () => setMode("all"));
    els.unansweredBtn.addEventListener("click", () => setMode("unanswered"));
    els.wrongBtn.addEventListener("click", () => setMode("wrong"));
    els.shuffleBtn.addEventListener("click", shuffleOrder);
    els.resetBtn.addEventListener("click", () => {
      if (!confirm("确定要清空做题记录吗？")) return;
      state.answers = {};
      state.current = 0;
      state.mode = "all";
      state.lecture = "all";
      saveState();
      render();
    });
    els.searchInput.addEventListener("input", (event) => {
      state.search = event.target.value;
      state.current = 0;
      render();
    });
    els.lectureRow.addEventListener("click", (event) => {
      const button = event.target.closest("[data-lecture]");
      if (!button) return;
      const lectureId = button.dataset.lecture;
      if (lectureId === "all" || getLectureById(lectureId)) setLecture(lectureId);
    });
    els.prevBtn.addEventListener("click", () => {
      state.current -= 1;
      saveState();
      render();
    });
    els.nextBtn.addEventListener("click", () => {
      state.current += 1;
      saveState();
      render();
    });

    window.addEventListener("keydown", (event) => {
      const q = currentQuestion();
      if (!q) return;
      const key = event.key.toLowerCase();
      if (["1", "2", "3", "4"].includes(key)) {
        answerQuestion(q.id, Number(key) - 1);
      }
      if (["a", "b", "c", "d"].includes(key)) {
        answerQuestion(q.id, letters.indexOf(key.toUpperCase()));
      }
      if (key === "arrowleft" && !els.prevBtn.disabled) {
        state.current -= 1;
        saveState();
        render();
      }
      if (key === "arrowright" && !els.nextBtn.disabled) {
        state.current += 1;
        saveState();
        render();
      }
    });

    loadState();
    render();
  </script>
</body>
</html>
