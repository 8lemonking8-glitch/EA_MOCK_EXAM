<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EA Final Quiz</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #647184;
      --line: #d8dee8;
      --brand: #2364aa;
      --brand-dark: #174d86;
      --ok: #177245;
      --ok-bg: #e8f6ee;
      --bad: #b3261e;
      --bad-bg: #fdeceb;
      --warn: #8a5a00;
      --warn-bg: #fff5d7;
      --shadow: 0 18px 45px rgba(34, 45, 60, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, #eef3f8 0, #f7f8fb 310px),
        var(--bg);
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(1600px, calc(100% - 32px));
      margin: 0 auto;
      padding: 22px 0 28px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .title h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .title p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      min-height: 38px;
      padding: 0 13px;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color .15s, background .15s, color .15s, transform .15s;
    }

    .btn:hover {
      border-color: #9fb2ca;
      transform: translateY(-1px);
    }

    .btn.primary {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }

    .btn.primary:hover {
      background: var(--brand-dark);
    }

    .btn.ghost {
      background: transparent;
    }

    .btn:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .side,
    .main {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .side {
      padding: 16px;
      position: sticky;
      top: 16px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px;
      min-height: 72px;
      background: #fbfcfe;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .stat strong {
      font-size: 22px;
      line-height: 1;
    }

    .progress {
      height: 10px;
      border-radius: 999px;
      background: #e8edf4;
      overflow: hidden;
      margin: 6px 0 16px;
    }

    .progress div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--brand), #2f9c73);
      transition: width .2s;
    }

    .mode-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .lecture-section {
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 14px 0;
      margin-bottom: 14px;
    }

    .lecture-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 9px;
    }

    .lecture-title span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
    }

    .lecture-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .lecture-btn {
      min-height: 46px;
      padding: 7px 9px;
      text-align: left;
      line-height: 1.25;
    }

    .lecture-btn strong,
    .lecture-btn span {
      display: block;
    }

    .lecture-btn strong {
      font-size: 13px;
    }

    .lecture-btn span {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .lecture-btn.primary span {
      color: rgba(255, 255, 255, .82);
    }

    .search {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 11px;
      margin-bottom: 12px;
      color: var(--ink);
      background: #fff;
    }

    .question-list {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
      max-height: 330px;
      overflow: auto;
      padding-right: 2px;
    }

    .qdot {
      height: 38px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      cursor: pointer;
    }

    .qdot.current {
      border-color: var(--brand);
      box-shadow: inset 0 0 0 2px rgba(35, 100, 170, .16);
    }

    .qdot.correct {
      background: var(--ok-bg);
      border-color: #9bd7b6;
      color: var(--ok);
    }

    .qdot.wrong {
      background: var(--bad-bg);
      border-color: #f0aaa5;
      color: var(--bad);
    }

    .qdot.discussion {
      position: relative;
      border-color: #d6b44a;
      box-shadow: inset 0 0 0 2px rgba(214, 180, 74, .18);
    }

    .qdot.discussion::after {
      content: "D";
      position: absolute;
      right: -4px;
      top: -6px;
      min-width: 16px;
      height: 16px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #8a5a00;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
    }

    .main {
      min-height: 620px;
      padding: 24px;
    }

    .question-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: #eef4fb;
      color: var(--brand-dark);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .question-index {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .question {
      margin: 22px 0 18px;
      font-size: 21px;
      line-height: 1.45;
      letter-spacing: 0;
    }

    .quiz-body {
      display: grid;
      grid-template-columns: minmax(380px, 1fr) minmax(380px, .95fr);
      gap: 24px;
      align-items: start;
      margin-top: 22px;
    }

    .question-pane,
    .explanation-pane {
      min-width: 0;
    }

    .question-pane .question {
      margin-top: 0;
    }

    .explanation-pane {
      position: sticky;
      top: 16px;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .option {
      width: 100%;
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 12px;
      align-items: center;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      min-height: 58px;
      padding: 10px 14px 10px 10px;
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .15s;
    }

    .option:hover {
      border-color: #9fb2ca;
      transform: translateY(-1px);
    }

    .letter {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: #f6f8fb;
      font-weight: 700;
    }

    .option.correct {
      border-color: #7fc89e;
      background: var(--ok-bg);
    }

    .option.correct .letter {
      background: var(--ok);
      border-color: var(--ok);
      color: #fff;
    }

    .option.wrong {
      border-color: #e89b95;
      background: var(--bad-bg);
    }

    .option.wrong .letter {
      background: var(--bad);
      border-color: var(--bad);
      color: #fff;
    }

    .feedback {
      display: none;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 18px;
      margin: 0 0 18px;
      line-height: 1.55;
    }

    .feedback.show {
      display: block;
    }

    .feedback.correct {
      border-color: #9bd7b6;
      background: var(--ok-bg);
    }

    .feedback.wrong {
      border-color: #f0aaa5;
      background: var(--bad-bg);
    }

    .feedback.placeholder {
      display: block;
      background: #fbfcfe;
      color: var(--muted);
    }

    .feedback strong {
      display: block;
      margin-bottom: 5px;
    }

    .feedback div {
      margin-top: 10px;
    }

    .feedback span {
      display: block;
    }

    .memory-card {
      border: 1px solid #e2cc7a;
      border-radius: 8px;
      background: #fff9e8;
      padding: 12px 14px;
      margin: 0 0 18px;
      line-height: 1.5;
      color: #3f3300;
    }

    .memory-card strong,
    .cheat-sheet strong {
      display: block;
      margin-bottom: 4px;
    }

    .lecture-guide {
      margin-top: 16px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .guide-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 9px;
    }

    .guide-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
      padding: 10px;
      margin-bottom: 8px;
      line-height: 1.45;
      font-size: 13px;
    }

    .guide-card.mastered {
      border-color: #9ad7b0;
      background: #f1fbf5;
    }

    .guide-card.warning {
      border-color: #e7c85c;
      background: #fff9df;
    }

    .guide-card.danger {
      border-color: #e59287;
      background: #fff1ef;
    }

    .guide-card strong,
    .guide-card span {
      display: block;
    }

    .guide-card strong {
      margin-bottom: 4px;
    }

    .guide-meta {
      color: var(--muted);
      margin-top: 4px;
    }

    .guide-focus {
      color: var(--warn);
      margin-top: 6px;
    }

    .guide-questions {
      color: var(--brand-dark);
      margin-top: 6px;
    }

    .cheat-sheet {
      margin-top: 16px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .cheat-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 9px;
    }

    .cheat-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
      padding: 10px;
      margin-bottom: 8px;
      line-height: 1.45;
      font-size: 13px;
    }

    .cheat-card span {
      display: block;
      color: var(--muted);
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      padding-top: 4px;
    }

    .empty {
      display: none;
      border: 1px dashed #b6c2d1;
      border-radius: 8px;
      padding: 28px;
      text-align: center;
      color: var(--muted);
      background: #fbfcfe;
    }

    .empty.show {
      display: block;
    }

    @media (max-width: 860px) {
      .app {
        width: min(100% - 20px, 720px);
        padding-top: 12px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .side {
        position: static;
      }

      .question-list {
        grid-template-columns: repeat(8, 1fr);
        max-height: none;
      }

      .main {
        min-height: auto;
        padding: 16px;
      }

      .question-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .quiz-body {
        grid-template-columns: 1fr;
      }

      .explanation-pane {
        position: static;
      }

      .question {
        font-size: 18px;
      }
    }

    @media (max-width: 520px) {
      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .question-list {
        grid-template-columns: repeat(5, 1fr);
      }

      .option {
        grid-template-columns: 34px 1fr;
      }

      .mode-row,
      .lecture-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="title">
        <h1>EA 期末刷题</h1>
        <p>Discussion 高优先级，但完整题库同时保留普通 PPT 核心题和跨概念应用题。</p>
      </div>
      <div class="toolbar">
        <button class="btn" id="shuffleBtn" type="button">随机顺序</button>
        <button class="btn" id="wrongBtn" type="button">错题模式</button>
        <button class="btn ghost" id="resetBtn" type="button">重置记录</button>
      </div>
    </header>

    <section class="layout">
      <aside class="side">
        <div class="stats" aria-live="polite">
          <div class="stat"><span>已答</span><strong id="answeredStat">0/120</strong></div>
          <div class="stat"><span>正确率</span><strong id="accuracyStat">0%</strong></div>
          <div class="stat"><span>正确</span><strong id="correctStat">0</strong></div>
          <div class="stat"><span>错题</span><strong id="wrongStat">0</strong></div>
        </div>
        <div class="progress" aria-label="Progress"><div id="progressBar"></div></div>
        <div class="mode-row">
          <button class="btn primary" id="allModeBtn" type="button">全部题目</button>
          <button class="btn" id="unansweredBtn" type="button">未答题</button>
          <button class="btn" id="discussionBtn" type="button">Discussion 题</button>
          <button class="btn" id="coreBtn" type="button">Core PPT 题</button>
          <button class="btn" id="mockBtn" type="button">Full Mock 40</button>
          <button class="btn" id="masteryBtn" type="button">Discussion Mastery</button>
          <button class="btn" id="weaknessBtn" type="button">Discussion Weakness</button>
        </div>
        <div class="lecture-section">
          <div class="lecture-title">逐 Lecture 刷题 <span>按老师 Discussion 抓考点</span></div>
          <div class="lecture-row" id="lectureRow" aria-label="Lecture filters"></div>
        </div>
        <input class="search" id="searchInput" type="search" placeholder="搜索题干/主题/中文考点" />
        <div class="question-list" id="questionList" aria-label="Question list"></div>
        <div class="lecture-guide" id="lectureGuide"></div>
        <div class="cheat-sheet">
          <div class="cheat-title">考前核心表</div>
          <div id="cheatSheet"></div>
        </div>
      </aside>

      <section class="main">
        <div class="empty" id="emptyState">
          当前筛选没有题目。
        </div>
        <article id="questionCard">
          <div class="question-head">
            <span class="tag" id="topicTag">Topic</span>
            <span class="question-index" id="questionIndex">Question 1 of 120</span>
          </div>
          <div class="quiz-body">
            <div class="question-pane">
              <h2 class="question" id="questionText"></h2>
              <div class="memory-card" id="memoryCard"></div>
              <div class="options" id="options"></div>
            </div>
            <aside class="explanation-pane" aria-label="答案解析">
              <div class="feedback" id="feedback"></div>
            </aside>
          </div>
          <div class="actions">
            <button class="btn" id="prevBtn" type="button">上一题</button>
            <button class="btn primary" id="nextBtn" type="button">下一题</button>
          </div>
        </article>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
